name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install -r backend/requirements.txt

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Vite build
        working-directory: frontend
        run: npm run build

      - name: Electron-builder (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: frontend
        shell: bash
        run: npx electron-builder --win --publish never 2>&1 | tee build.log
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-builder
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Electron-builder (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: frontend
        run: npx electron-builder --mac --publish never 2>&1 | tee build.log
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-builder
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Electron-builder (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: frontend
        run: npx electron-builder --linux --publish never 2>&1 | tee build.log
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-builder
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.os }}
          path: frontend/build.log
          if-no-files-found: ignore

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hearth-${{ matrix.os }}
          path: |
            frontend/dist-electron/*.dmg
            frontend/dist-electron/*.exe
            frontend/dist-electron/*.AppImage
            frontend/dist-electron/*.zip
          if-no-files-found: ignore

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/dist-electron/*.dmg
            frontend/dist-electron/*.exe
            frontend/dist-electron/*.AppImage
          token: ${{ secrets.GITHUB_TOKEN }}
